name: Tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  phpunit:
    name: PHPUnit (PHP 8.2)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: intl, mbstring
          coverage: none
          tools: composer:v2

      - name: Validate Composer configuration
        run: composer validate --no-check-publish

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run test suite
        shell: bash
        run: |
          set -o pipefail
          composer test 2>&1 | tee build/phpunit-output.txt

      - name: Upload PHPUnit diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phpunit-diagnostics
          path: build/phpunit-output.txt
          if-no-files-found: ignore
          retention-days: 7
